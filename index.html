<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wer wird Siegionär – Multiplayer</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>

body{
font-family:Arial;
background:#0c0f2b;
color:white;
text-align:center;
margin:0;
padding:0;
}

#game{
max-width:800px;
margin:auto;
padding:20px;
}

button{
padding:15px;
margin:10px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:8px;
}

.answer{
display:block;
width:100%;
background:#1f2a70;
color:white;
}

#leaderboard{
margin-top:30px;
}

</style>
</head>

<body>

<div id="game">

<h1>Wer wird Siegionär</h1>

<div id="login">

<input id="name" placeholder="Dein Name">
<br><br>
<button onclick="joinGame()">Spiel beitreten</button>

</div>

<div id="quiz" style="display:none">

<h2 id="question"></h2>

<button class="answer" onclick="answer(0)" id="a0"></button>
<button class="answer" onclick="answer(1)" id="a1"></button>
<button class="answer" onclick="answer(2)" id="a2"></button>
<button class="answer" onclick="answer(3)" id="a3"></button>

</div>

<div id="leaderboard">

<h2>Punkte</h2>
<div id="scores"></div>

</div>

</div>

<script>

const firebaseConfig = {

apiKey: "APIKEY",
authDomain: "quiz.firebaseapp.com",
databaseURL: "https://quiz-default-rtdb.firebaseio.com",
projectId: "quiz"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let playerName = "";
let currentQuestion = 0;

const questions = [

{
q:"Welche Farbe hat der Himmel?",
a:["Blau","Rot","Grün","Gelb"],
c:0
},

{
q:"Wie viele Tage hat eine Woche?",
a:["5","6","7","8"],
c:2
},

{
q:"Welcher Planet ist die Erde?",
a:["1","2","3","4"],
c:2
}

];

function joinGame(){

playerName = document.getElementById("name").value;

db.ref("players/"+playerName).set({
points:0
});

document.getElementById("login").style.display="none";
document.getElementById("quiz").style.display="block";

showQuestion();

listenScores();

}

function showQuestion(){

let q = questions[currentQuestion];

document.getElementById("question").innerText = q.q;

for(let i=0;i<4;i++){

document.getElementById("a"+i).innerText = q.a[i];

}

}

function answer(i){

let q = questions[currentQuestion];

if(i === q.c){

db.ref("players/"+playerName+"/points")
.transaction(p => (p||0)+100);

}

currentQuestion++;

if(currentQuestion < questions.length){

showQuestion();

}else{

alert("Spiel beendet");

}

}

function listenScores(){

db.ref("players").on("value", snap => {

let data = snap.val();

let html="";

for(let p in data){

html += p + ": " + data[p].points + "<br>";

}

document.getElementById("scores").innerHTML = html;

});

}

</script>

</body>
</html>
