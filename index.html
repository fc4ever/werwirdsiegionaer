<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wer wird Siegionär – Multiplayer</title>
<style>
  body { font-family: Arial, sans-serif; background:#222; color:#fff; text-align:center; padding:20px;}
  h1 { margin-bottom:10px; }
  #question { font-size:24px; margin:20px;}
  .answerBtn { display:block; margin:10px auto; padding:10px 20px; font-size:18px; cursor:pointer;}
  #scoreboard, #teams { margin-top:30px; text-align:left; max-width:600px; margin-left:auto; margin-right:auto;}
  table { width:100%; border-collapse: collapse;}
  th, td { border:1px solid #fff; padding:5px; text-align:center;}
</style>
</head>
<body>

<h1>Wer wird Siegionär – Multiplayer</h1>
<div id="question">Lade Frage...</div>
<div id="answers"></div>

<div id="teams"><strong>Spieler/Teams:</strong> <span id="playerList"></span></div>
<div id="scoreboard"><strong>Scoreboard:</strong><br>
<table>
<thead>
<tr><th>Spieler</th><th>Team</th><th>Punkte</th></tr>
</thead>
<tbody id="scoreBody"></tbody>
</table>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ==== Firebase Config ====
const firebaseConfig = {
  apiKey: "AIzaSyCX0T-FVwjDjGi7SH03LXMi2Een8bmsGp8",
  authDomain: "werwirdsiegionaer.firebaseapp.com",
  databaseURL: "https://werwirdsiegionaer-default-rtdb.firebaseio.com",
  projectId: "werwirdsiegionaer",
  storageBucket: "werwirdsiegionaer.firebasestorage.app",
  messagingSenderId: "429822780249",
  appId: "1:429822780249:web:8210f01b7ddfa13b672248",
  measurementId: "G-CPHLGGH9J4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ==== Fragen mit Siegfried-Antworten ====
const questions = [
  {q:"Was geht Siegfried auf dem Campingplatz so richtig auf die Nerven?", a:[
    "Wenn jemand über den Platz läuft und sich dabei die Zähne putzt",
    "Laute Musik am frühen Morgen",
    "Ständiges Rein- und Rausfahren von Autos",
    "Wenn fremde Campingstühle benutzt werden"
  ], correct:1}, // z.B. Siegfried sagt B ist richtig
  {q:"Was nervt Siegfried auf dem Campingplatz außerdem ganz besonders?", a:[
    "Wenn der Nachbar lautstark Dauergespräche führt",
    "Wenn schon früh morgens der Grill angeworfen wird",
    "Wenn Ordnung und Wege nicht eingehalten werden",
    "Wenn ständig jemand „nur mal kurz“ vorbeischaut"
  ], correct:0},
  {q:"Welches Gericht würde Siegfried im Restaurant immer bestellen?", a:[
    "Zigeunerschnitzel mit Pommes",
    "Steak mit Kräuterbutter",
    "Spaghetti Bolognese",
    "Pizza"
  ], correct:0},
  {q:"Welcher Schokoriegel ist Siegfrieds Lieblingsriegel?", a:[
    "Snickers",
    "Mars",
    "Bounty",
    "Twix"
  ], correct:0},
  {q:"Was denkt Siegfried über Rosinen?", a:[
    "Lieber herzhaft – z.B. in der Sauce zum Sauerbraten",
    "Am liebsten süß – z.B. in meiner Rosinenstuten",
    "Hätte man besser vorher Wein draus gemacht",
    "Keine Meinung: Trauben sind wie Menschen – je älter, desto schrumpliger; man hat sie nicht mehr oder weniger gern"
  ], correct:1},
  {q:"Was würde Siegfried mit dem Apfelbaum machen, wenn er selbst entscheiden könnte?", a:[
    "Pflegen und stehen lassen",
    "Umpflanzen",
    "Rausreißen",
    "Zum Klettern freigeben"
  ], correct:0},
  {q:"Welches Musikinstrument hätte Siegfried gerne gelernt zu spielen?", a:[
    "Querflöte",
    "Gitarre",
    "Schlagzeug",
    "Kontrabass"
  ], correct:1},
  {q:"Zu welchem Song würde Siegfried freiwillig und ohne Protest tanzen?", a:[
    "Rot sind die Rosen – Die Korntaler",
    "Marmorstein und Eisen bricht – Drafi Deutscher",
    "Skandal im Sperrbezirk – Spider Murphy Gang",
    "Da steht ein Pferd auf dem Flur – Klaus & Klaus"
  ], correct:2},
  {q:"Welchen Film muss Siegfried jedes Jahr mindestens einmal gesehen haben?", a:[
    "James Bond – Goldfinger",
    "Ben Hur",
    "Das fliegende Klassenzimmer",
    "Casablanca"
  ], correct:0},
  {q:"Welches Gartengerät ist Siegfrieds heimlicher Favorit?", a:[
    "Der Rasenmäher – ordentlich muss es sein",
    "Die Heckenschere – Form und Struktur",
    "Die Kettensäge – wenn schon, dann richtig",
    "Der Spaten – solide Handarbeit"
  ], correct:0},
  {q:"Wie geht Siegfried an Reparaturen im Haus heran?", a:[
    "Erst alles genau anschauen, dann loslegen",
    "Werkzeug holen und einfach anfangen",
    "Improvisieren, wenn es funktioniert",
    "Lieber einmal richtig als zweimal halb"
  ], correct:0}
];

// ==== Spieler-ID & Team automatisch generieren ====
let playerId = 'player_' + Math.floor(Math.random()*10000);
let team = 'Team_' + (Math.floor(Math.random()*2)+1);
let currentQuestion = 0;

// Spieler registrieren
db.ref('players/'+playerId).set({score:0, team: team});
db.ref('players').on('value', snap => {
  const players = snap.val() || {};
  document.getElementById('playerList').innerText = Object.keys(players).map(id=>`${id}(${players[id].team})`).join(', ');
  updateScoreboard(players);
});

// Scoreboard aktualisieren
function updateScoreboard(players){
  const tbody = document.getElementById('scoreBody');
  tbody.innerHTML = '';
  for(const id in players){
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${id}</td><td>${players[id].team}</td><td>${players[id].score || 0}</td>`;
    tbody.appendChild(tr);
  }
}

// Frage anzeigen
function showQuestion(){
  if(currentQuestion >= questions.length){
    document.getElementById('question').innerText = "🎉 Spiel beendet!";
    document.getElementById('answers').innerHTML = '';
    return;
  }
  const q = questions[currentQuestion];
  document.getElementById('question').innerText = q.q;
  const answersDiv = document.getElementById('answers');
  answersDiv.innerHTML = '';
  q.a.forEach((ans,i)=>{
    const btn = document.createElement('button');
    btn.innerText = ans;
    btn.className = 'answerBtn';
    btn.onclick = ()=> submitAnswer(i);
    answersDiv.appendChild(btn);
  });
}

// Antwort absenden
function submitAnswer(choice){
  const q = questions[currentQuestion];
  if(choice === q.correct){
    db.ref('players/'+playerId+'/score').transaction(s => (s||0)+1);
  }
  db.ref('answers/'+currentQuestion+'/'+playerId).set(choice);
}

// Beobachten, wann alle Spieler geantwortet haben
db.ref('answers').on('value', snap=>{
  const ansData = snap.val() || {};
  const questionAnswers = ansData[currentQuestion] || {};
  db.ref('players').once('value', snapPlayers=>{
    const playerCount = Object.keys(snapPlayers.val()||{}).length;
    const answeredCount = Object.keys(questionAnswers).length;
    if(answeredCount >= playerCount && playerCount>0){
      currentQuestion++;
      showQuestion();
    }
  });
});

showQuestion();
</script>

</body>
</html>
